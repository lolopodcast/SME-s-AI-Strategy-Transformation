<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Strategy & Org Transformation - Prof. Shihmin Lo</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- BCG Professional Theme Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bcg: {
                            green: '#004537',   // 深綠色 (BCG Green)
                            gold: '#D4AF37',    // 金色
                            light: '#F4F7F6',   // 淺灰色
                            dark: '#0A0A0A'     // 近黑色
                        }
                    },
                    fontFamily: {
                        serif: ['Georgia', 'Cambria', 'serif'],
                        sans: ['"Noto Sans TC"', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* 強制顯示垂直捲軸，防止切換頁面時左右跳動 */
        body { overflow-y: scroll; }
        
        .select-none { user-select: none; -webkit-user-select: none; }
        .perspective { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        
        /* 自定義捲軸 - BCG 風格 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #004537; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-in-out; }
        
        /* 版面修正 */
        .fixed-header { height: 64px; }
        .fixed-footer { height: 32px; }
    </style>
</head>
<body class="bg-bcg-light text-slate-900 dark:bg-bcg-dark dark:text-gray-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- 網域與安全性保護 ---
        const DOMAIN_WHITE_LIST = ['localhost', '127.0.0.1', 'lolopodcast.github.io'];
        const checkDomain = () => {
            const host = window.location.hostname;
            const isSafe = DOMAIN_WHITE_LIST.some(d => host.includes(d)) || host === "" || host.includes("googleusercontent");
            
            if (!isSafe) {
                console.warn("Domain protection triggered. Redirect is bypassed for preview stability.");
                // ⚠️ 教授請注意：正式部署到 GitHub 時，請將下方這一行的註解 (//) 拿掉，即可啟動網域綁定鎖定！
                // window.location.href = "https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo";
            }
        };

        // --- 圖示系統 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                menu: (
                    <>
                        <path d="M4 6h16M4 12h16M4 18h16" />
                    </>
                ),
                x: (
                    <>
                        <path d="M18 6L6 18M6 6l12 12" />
                    </>
                ),
                home: (
                    <>
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </>
                ),
                voice: (
                    <>
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </>
                ),
                globe: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </>
                ),
                sun: (
                    <>
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </>
                ),
                moon: (
                    <>
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </>
                ),
                arrowRight: (
                    <>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19" />
                    </>
                ),
                arrowLeft: (
                    <>
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5" />
                    </>
                ),
                top: (
                    <>
                        <polyline points="18 15 12 9 6 15" />
                    </>
                ),
                check: (
                    <>
                        <polyline points="20 6 9 17 4 12" />
                    </>
                ),
                chart: (
                    <>
                        <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
                        <path d="M22 12A10 10 0 0 0 12 2v10z"/>
                    </>
                ),
                save: (
                    <>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </>
                )
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- 內容數據 (全面雙語化對應) ---
        const CONTENT = {
            TC: {
                brand: "AIST",
                title: "AI 導入與組織變革",
                nav: [
                    "0. 執行概要", "1. 中小企業特性", "2. 3P 變革模型", "3. 數位轉型層次", 
                    "4. AI 分類定義", "5. 實施方法論", "6. 數據與 ROI", 
                    "7. 互動實驗室", "8. 外部資源", "9. 學習歷程"
                ],
                unit0: {
                    summary: "本課程旨在探討中小企業如何透過 AI 驅動組織轉型。在全球數位化浪潮下，台灣中小企業（SME）面臨傳承斷層與數位落差。我們提出的「擴增智慧」架構，強調 AI 作為人類決策的副駕駛。透過 3P 模型（定位、流程、人）的協調，企業能從依賴直覺的經營轉向數據驅動。本教材將系統化介紹導入策略、CRISP-DM 方法論及變革戰術，協助建立具備競爭力的 AI 體系。",
                    blocks: ["單元 1", "單元 2", "單元 3", "單元 4", "單元 5", "單元 6", "實驗室", "資源", "歷程"]
                },
                common: {
                    next: "下一單元", prev: "上一單元", architect: "設計者", top: "頂端", 
                    read: "已讀", total: "總計", correct: "答對", 
                    alertTitle: "版權提示", alertMsg: "Intellectual Property of Prof. Shihmin Lo",
                    export: "匯出 CSV", fillInfo: "請填寫個人資料",
                    cardsTitle: "知識圖卡", quizTitle: "模組檢定測驗",
                    quizSuccess: "太棒了！完全正確。", quizFail: "再接再厲！從錯誤中學習。"
                }
            },
            EN: {
                brand: "AIST",
                title: "AI Strategy & Org Transformation",
                nav: [
                    "0. Executive Summary", "1. SME Characteristics", "2. 3P Change Model", "3. DX Levels", 
                    "4. AI Definitions", "5. Methodology", "6. Data & ROI", 
                    "7. Interactive Lab", "8. External Resources", "9. Learning Analytics"
                ],
                unit0: {
                    summary: "This course explores how SMEs leverage AI for organizational transformation. In the digital age, Taiwan's SMEs face challenges like succession gaps and digital divides. Our 'Augmented Intelligence' framework emphasizes AI as a co-pilot for human decision-making. Through the 3P model (Position, Process, People), enterprises shift from intuition-based to data-driven operations. This material systematically introduces adoption strategies, CRISP-DM methodology, and change tactics to build a competitive AI-enabled system.",
                    blocks: ["Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5", "Unit 6", "Lab", "Resources", "Analytics"]
                },
                common: {
                    next: "Next Theme", prev: "Previous Theme", architect: "Architect", top: "Top", 
                    read: "Read", total: "Total", correct: "Correct",
                    alertTitle: "Copyright Notice", alertMsg: "Intellectual Property of Prof. Shihmin Lo",
                    export: "Export CSV", fillInfo: "Please fill in personal details",
                    cardsTitle: "Knowledge Cards", quizTitle: "Module Quiz",
                    quizSuccess: "Excellent! Well done.", quizFail: "Keep going! You can do it."
                }
            }
        };

        // --- 主題單元數據 (Units 1-6) - 落實全面雙語化 ---
        const UNIT_DATA = {
            1: {
                title: { TC: "中小企業 (SME) 的特性與挑戰", EN: "SME Characteristics & Challenges" },
                deepDive: {
                    TC: "台灣中小企業佔企業總數 98%，具備高度決策彈性。然而，資源限制是主要痛點。導入 AI 時不應追求大規模改進，而應尋找能產生即時效益的「速贏」(Quick Win) 項目。這有助於緩解對技術的不安全感。",
                    EN: "SMEs represent 98% of businesses in Taiwan, offering agility. However, resource constraints are key pain points. AI adoption should focus on 'Quick Wins' rather than large-scale overhaul to build confidence and mitigate technical insecurity."
                },
                cards: {
                    TC: [
                        { f: "SME 最大優勢", b: "極高的決策彈性與市場反應速度" },
                        { f: "隱形冠軍 (Hidden Champions)", b: "在細分市場佔有率極高但低調的強者" },
                        { f: "數位落差 (Digital Divide)", b: "企業間因數位技術應用能力不同產生的差距" },
                        { f: "速贏 (Quick Win)", b: "低成本、高能見度，能快速建立信心的專案" }
                    ],
                    EN: [
                        { f: "SME Advantage", b: "Flexibility & Fast Decision-making" },
                        { f: "Hidden Champions", b: "Niche leaders with high market share" },
                        { f: "Digital Divide", b: "Inequality in tech capability" },
                        { f: "Quick Win", b: "Low cost, high visibility project" }
                    ]
                },
                quiz: {
                    TC: [
                        { q: "台灣中小企業佔比約為多少？", a: ["50%", "70%", "98%"], c: 2 },
                        { q: "在本課程架構中，AI 應扮演什麼角色？", a: ["人類取代者", "決策副駕駛", "純娛樂工具"], c: 1 }
                    ],
                    EN: [
                        { q: "What is the approximate SME percentage in Taiwan?", a: ["50%", "70%", "98%"], c: 2 },
                        { q: "What is the primary role of AI in this framework?", a: ["Human Replacer", "Co-pilot", "Toy"], c: 1 }
                    ]
                }
            },
            // 未來可在這裡擴充單元 2-6 的中英對照資料
        };

        // --- UI 元件 ---

        const CopyrightModal = ({ show, onClose, text }) => {
            if (!show) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                    <div className="bg-white dark:bg-bcg-dark border-t-4 border-bcg-gold p-6 rounded-lg shadow-2xl max-w-sm w-full text-center">
                        <Icon name="save" className="mx-auto mb-4 text-bcg-gold" size={48} />
                        <h2 className="text-xl font-bold mb-2 text-bcg-green dark:text-bcg-gold">Copyright Notice</h2>
                        <p className="text-sm text-gray-600 dark:text-gray-400 mb-6">{text}</p>
                        <button onClick={onClose} className="w-full bg-bcg-green text-white px-8 py-2 rounded-full hover:bg-opacity-90 transition shadow-md font-bold">OK</button>
                    </div>
                </div>
            );
        };

        const FlipCard = ({ data, onRead }) => {
            const [flipped, setFlipped] = useState(false);
            const handleClick = () => {
                setFlipped(!flipped);
                if (!flipped) onRead();
            };
            return (
                <div className="perspective w-full h-40 md:h-48 cursor-pointer group" onClick={handleClick}>
                    <div className={`relative w-full h-full transition-transform duration-500 transform-style-3d ${flipped ? 'rotate-y-180' : ''}`}>
                        <div className="absolute inset-0 backface-hidden bg-white dark:bg-slate-800 border-2 border-bcg-green/20 rounded-xl p-4 md:p-6 flex items-center justify-center text-center shadow-md group-hover:border-bcg-gold transition-colors">
                            <span className="font-bold text-bcg-green dark:text-bcg-gold">{data.f}</span>
                        </div>
                        <div className="absolute inset-0 backface-hidden rotate-y-180 bg-bcg-green text-white rounded-xl p-4 md:p-6 flex items-center justify-center text-center shadow-xl">
                            <span className="text-sm md:text-base">{data.b}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const Quiz = ({ questions, onResult, t }) => {
            const [idx, setIdx] = useState(0);
            const [selected, setSelected] = useState(null);
            const q = questions[idx];

            const handleAns = (i) => {
                if (selected !== null) return;
                setSelected(i);
                const isCorrect = i === q.c;
                onResult(isCorrect);
            };

            const next = () => {
                if (idx < questions.length - 1) {
                    setIdx(idx + 1);
                    setSelected(null);
                }
            };

            return (
                <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border border-gray-100 dark:border-slate-700 shadow-sm">
                    <div className="text-xs text-bcg-green dark:text-bcg-gold font-bold mb-2">Q {idx + 1} / {questions.length}</div>
                    <div className="font-bold mb-4">{q.q}</div>
                    <div className="space-y-3">
                        {q.a.map((opt, i) => (
                            <button key={i} onClick={() => handleAns(i)} 
                                className={`w-full text-left p-3 rounded-lg border transition shadow-sm ${selected === i ? (i === q.c ? 'bg-green-50 border-green-500 text-green-800 dark:bg-green-900/30 dark:text-green-300' : 'bg-red-50 border-red-500 text-red-800 dark:bg-red-900/30 dark:text-red-300') : 'hover:bg-gray-50 dark:hover:bg-slate-700 dark:border-slate-600'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    {selected !== null && (
                        <div className="mt-6 flex items-center justify-between animate-fadeIn">
                            <span className={`text-sm font-bold ${selected === q.c ? 'text-green-600 dark:text-green-400' : 'text-red-500 dark:text-red-400'}`}>
                                {selected === q.c ? t.quizSuccess : t.quizFail}
                            </span>
                            <button onClick={next} disabled={idx >= questions.length - 1} className={`px-4 py-2 rounded text-sm font-bold transition ${idx >= questions.length - 1 ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-bcg-green text-white hover:bg-opacity-90 shadow-md'}`}>
                                Next
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- 主程式 ---
        const App = () => {
            const [lang, setLang] = useState('EN');
            const [darkMode, setDarkMode] = useState(true);
            const [menuOpen, setMenuOpen] = useState(false);
            const [currentUnit, setCurrentUnit] = useState(0);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [showModal, setShowModal] = useState(false);
            
            // 數據分析狀態
            const startTimeRef = useRef(Date.now());
            const [elapsedSecs, setElapsedSecs] = useState(0);
            const [stats, setStats] = useState({
                clicks: 0,
                cardsRead: new Set(),
                quizTotal: 0,
                quizCorrect: 0
            });

            const t = CONTENT[lang];

            // 網域檢查與事件阻擋 (僅執行一次)
            useEffect(() => {
                checkDomain();
                
                const blocker = (e) => {
                    if (e.ctrlKey && (e.key === 'u' || e.key === 'i' || e.key === 'j' || e.key === 'c')) {
                        e.preventDefault();
                        setShowModal(true);
                    }
                    if (e.key === 'F12') {
                        e.preventDefault();
                        setShowModal(true);
                    }
                };
                window.addEventListener('keydown', blocker);
                
                const contextBlocker = (e) => {
                    if (window.getSelection().toString().length === 0) {
                        e.preventDefault();
                        setShowModal(true);
                    }
                };
                window.addEventListener('contextmenu', contextBlocker);

                return () => {
                    window.removeEventListener('keydown', blocker);
                    window.removeEventListener('contextmenu', contextBlocker);
                };
            }, []);

            // 監聽深淺色切換
            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            // 單元 9 的計時器更新
            useEffect(() => {
                let timer;
                if (currentUnit === 9) {
                    setElapsedSecs(Math.floor((Date.now() - startTimeRef.current) / 1000));
                    timer = setInterval(() => {
                        setElapsedSecs(Math.floor((Date.now() - startTimeRef.current) / 1000));
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [currentUnit]);

            const logClick = () => setStats(s => ({ ...s, clicks: s.clicks + 1 }));

            // 語音導覽 - 增強語言選擇的精準度
            const toggleTTS = () => {
                if (isSpeaking) {
                    window.speechSynthesis.cancel();
                    setIsSpeaking(false);
                } else {
                    const text = document.querySelector('main').innerText;
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = window.speechSynthesis.getVoices();
                    
                    if (lang === 'EN') {
                        utterance.voice = voices.find(v => v.lang === 'en-GB' || v.lang === 'en-US') || null;
                        utterance.lang = 'en-GB';
                    } else {
                        utterance.voice = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Yating')) || voices.find(v => v.lang === 'zh-TW') || null;
                        utterance.lang = 'zh-TW';
                    }
                    
                    utterance.onend = () => setIsSpeaking(false);
                    window.speechSynthesis.speak(utterance);
                    setIsSpeaking(true);
                }
            };

            // 切換語言時停止語音
            const handleLangChange = () => {
                window.speechSynthesis.cancel();
                setIsSpeaking(false);
                setLang(l => l === 'EN' ? 'TC' : 'EN');
                logClick();
            };

            // 跳轉頁面時停止語音，並回到頂部
            const jumpTo = (u) => {
                window.speechSynthesis.cancel();
                setIsSpeaking(false);
                setCurrentUnit(u);
                setMenuOpen(false);
                window.scrollTo(0,0);
                logClick();
            };

            const exportCSV = () => {
                const group = document.getElementById('uGroup')?.value || 'N/A';
                const id = document.getElementById('uID')?.value || 'N/A';
                const name = document.getElementById('uName')?.value || 'N/A';
                const finalSecs = Math.floor((Date.now() - startTimeRef.current) / 1000);
                
                const rows = [
                    ["Field", "Value"],
                    ["Name", name],
                    ["Student ID", id],
                    ["Group", group],
                    ["Time (sec)", finalSecs],
                    ["Clicks", stats.clicks],
                    ["Cards Read", stats.cardsRead.size],
                    ["Quiz Accuracy", stats.quizTotal ? (stats.quizCorrect / stats.quizTotal).toFixed(2) : 0],
                    ["Export Date", new Date().toLocaleDateString()]
                ];

                let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `AIST_Plan_${group}_${id}_${name}_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
            };

            // --- 渲染區塊 ---

            const renderUnit0 = () => (
                <div className="space-y-8 animate-fadeIn">
                    <div className="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl shadow-xl border-l-8 border-bcg-green">
                        <h1 className="text-2xl md:text-3xl font-serif font-bold mb-6 text-bcg-green dark:text-bcg-gold">{t.title}</h1>
                        <p className="text-base md:text-lg leading-relaxed text-justify mb-8">{t.unit0.summary}</p>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4">
                            {t.unit0.blocks.map((b, i) => (
                                <button key={i} onClick={() => jumpTo(i+1)} className="p-3 md:p-4 bg-bcg-light dark:bg-slate-700 rounded-xl hover:bg-bcg-gold/20 border-2 border-transparent hover:border-bcg-gold transition font-bold text-xs md:text-sm shadow-sm">
                                    {b}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderStandardUnit = (u) => {
                const data = UNIT_DATA[u] || UNIT_DATA[1];
                return (
                    <div className="space-y-8 animate-fadeIn">
                        <div className="flex justify-between items-center">
                            <h2 className="text-xl md:text-2xl font-bold font-serif border-b-4 border-bcg-gold pb-2">{data.title[lang]}</h2>
                            <div className="text-xs font-bold text-bcg-green dark:text-bcg-gold whitespace-nowrap ml-4">Unit {u} / 6</div>
                        </div>

                        <section className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-slate-700">
                            <h3 className="font-bold text-bcg-green dark:text-bcg-gold mb-4 flex items-center gap-2">
                                <Icon name="chart" size={18} /> Deep Dive
                            </h3>
                            <p className="leading-loose text-justify whitespace-pre-line text-sm md:text-base">{data.deepDive[lang]}</p>
                        </section>

                        <div className="grid md:grid-cols-2 gap-8">
                            <div className="space-y-4">
                                <h4 className="font-bold flex items-center gap-2 text-bcg-green dark:text-white"><Icon name="sun" size={16}/> {t.common.cardsTitle}</h4>
                                <div className="grid grid-cols-2 gap-4">
                                    {data.cards[lang].slice(0, 2).map((c, i) => (
                                        <FlipCard key={i} data={c} onRead={() => setStats(s => {
                                            const newSet = new Set(s.cardsRead);
                                            newSet.add(`${u}-${i}`);
                                            return { ...s, cardsRead: newSet };
                                        })} />
                                    ))}
                                </div>
                                <div className="text-right text-xs text-gray-500 font-bold">{t.common.read}: {stats.cardsRead.size}</div>
                            </div>
                            <div className="space-y-4">
                                <h4 className="font-bold flex items-center gap-2 text-bcg-green dark:text-white"><Icon name="check" size={16}/> {t.common.quizTitle}</h4>
                                <Quiz questions={data.quiz[lang]} t={t.common} onResult={(c) => setStats(s => ({...s, quizTotal: s.quizTotal+1, quizCorrect: s.quizCorrect + (c?1:0)}))} />
                            </div>
                        </div>
                    </div>
                );
            };

            const renderUnit9 = () => (
                <div className="space-y-6 animate-fadeIn">
                    <div className="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100 dark:border-slate-700">
                        <h2 className="text-xl md:text-2xl font-bold mb-6 flex items-center gap-2 text-bcg-green dark:text-bcg-gold"><Icon name="chart" /> {t.nav[9]}</h2>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-8">
                            <div className="p-4 bg-bcg-light dark:bg-slate-900 rounded-lg text-center shadow-inner">
                                <div className="text-2xl md:text-3xl font-bold text-bcg-green dark:text-bcg-gold">{elapsedSecs}s</div>
                                <div className="text-[10px] uppercase font-bold text-gray-500 mt-1">Duration</div>
                            </div>
                            <div className="p-4 bg-bcg-light dark:bg-slate-900 rounded-lg text-center shadow-inner">
                                <div className="text-2xl md:text-3xl font-bold text-bcg-green dark:text-bcg-gold">{stats.clicks}</div>
                                <div className="text-[10px] uppercase font-bold text-gray-500 mt-1">Clicks</div>
                            </div>
                            <div className="p-4 bg-bcg-light dark:bg-slate-900 rounded-lg text-center shadow-inner">
                                <div className="text-2xl md:text-3xl font-bold text-bcg-green dark:text-bcg-gold">{stats.cardsRead.size}</div>
                                <div className="text-[10px] uppercase font-bold text-gray-500 mt-1">Cards</div>
                            </div>
                            <div className="p-4 bg-bcg-light dark:bg-slate-900 rounded-lg text-center shadow-inner">
                                <div className="text-2xl md:text-3xl font-bold text-bcg-green dark:text-bcg-gold">
                                    {stats.quizTotal ? Math.round(stats.quizCorrect/stats.quizTotal*100) : 0}%
                                </div>
                                <div className="text-[10px] uppercase font-bold text-gray-500 mt-1">Accuracy</div>
                            </div>
                        </div>

                        <div className="space-y-4 max-w-md mx-auto bg-gray-50 dark:bg-slate-900/50 p-6 rounded-xl border border-gray-100 dark:border-slate-800">
                            <h3 className="font-bold text-center text-sm mb-4">{t.common.fillInfo}</h3>
                            <input id="uGroup" type="text" placeholder="Group (e.g., G1)" className="w-full p-3 rounded-lg border border-gray-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-bcg-green outline-none transition-shadow" />
                            <input id="uID" type="text" placeholder="Student ID" className="w-full p-3 rounded-lg border border-gray-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-bcg-green outline-none transition-shadow" />
                            <input id="uName" type="text" placeholder="Name" className="w-full p-3 rounded-lg border border-gray-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-bcg-green outline-none transition-shadow" />
                            <button onClick={exportCSV} className="w-full bg-bcg-green text-white p-3 mt-2 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-opacity-90 transition shadow-md">
                                <Icon name="save" /> {t.common.export}
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col select-none">
                    {/* 頁首 Header */}
                    <header className="fixed top-0 w-full h-16 bg-white/95 dark:bg-bcg-dark/95 backdrop-blur-md z-40 border-b border-gray-200 dark:border-slate-800 px-4 md:px-8 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3 md:gap-4">
                            <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                                {menuOpen ? <Icon name="x" /> : <Icon name="menu" />}
                            </button>
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => jumpTo(0)}>
                                <div className="bg-bcg-green text-white p-1 rounded font-bold text-xs tracking-tighter shadow">AIST</div>
                                <span className="font-serif font-bold text-lg hidden sm:block truncate">{t.title}</span>
                            </div>
                            <button onClick={() => jumpTo(0)} className="hidden sm:block p-2 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-full text-bcg-green dark:text-bcg-gold transition-colors">
                                <Icon name="home" />
                            </button>
                        </div>
                        <div className="flex items-center gap-1 md:gap-2">
                            <button onClick={toggleTTS} className={`p-2 rounded-full transition-colors ${isSpeaking ? 'bg-bcg-gold text-white animate-pulse shadow-md' : 'hover:bg-gray-100 dark:hover:bg-slate-800'}`}>
                                <Icon name="voice" />
                            </button>
                            <button onClick={handleLangChange} className="flex items-center gap-1 text-[10px] md:text-xs font-bold bg-bcg-light dark:bg-slate-800 px-3 py-1.5 md:py-2 rounded-full border border-gray-200 dark:border-slate-700 hover:border-bcg-gold transition-colors shadow-sm">
                                <Icon name="globe" size={14} /> {lang}
                            </button>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 text-bcg-gold transition-colors">
                                {darkMode ? <Icon name="sun" /> : <Icon name="moon" />}
                            </button>
                        </div>
                    </header>

                    {/* 漢堡選單列與行動版遮罩 */}
                    {menuOpen && (
                        <>
                            <div className="fixed inset-0 bg-black/20 z-30 md:hidden" onClick={() => setMenuOpen(false)}></div>
                            <nav className="fixed top-16 left-0 w-64 md:w-72 h-[calc(100vh-64px)] bg-white dark:bg-bcg-dark z-40 border-r border-gray-200 dark:border-slate-800 shadow-2xl overflow-y-auto p-4 animate-fadeIn">
                                {t.nav.map((n, i) => (
                                    <button key={i} onClick={() => jumpTo(i)} className={`w-full text-left p-3 md:p-4 rounded-xl mb-2 flex items-center gap-3 transition-all ${currentUnit === i ? 'bg-bcg-green text-white shadow-lg' : 'hover:bg-bcg-light dark:hover:bg-slate-800 text-gray-600 dark:text-gray-400'}`}>
                                        <span className="font-mono opacity-50 text-xs">0{i}</span>
                                        <span className="font-bold text-sm">{n}</span>
                                    </button>
                                ))}
                            </nav>
                        </>
                    )}

                    {/* 主要內容區 */}
                    <main className="flex-1 mt-16 pb-16 px-4 md:px-8 max-w-5xl mx-auto w-full">
                        <div className="py-6 md:py-8">
                            {currentUnit === 0 && renderUnit0()}
                            {currentUnit > 0 && currentUnit < 7 && renderStandardUnit(currentUnit)}
                            {currentUnit === 9 && renderUnit9()}
                        </div>
                        
                        {/* 底部導覽按鈕 */}
                        <div className="flex justify-between mt-8 md:mt-12 pt-6 md:pt-8 border-t border-gray-200 dark:border-slate-800">
                            {currentUnit > 0 ? (
                                <button onClick={() => jumpTo(currentUnit - 1)} className="flex items-center gap-2 text-sm font-bold text-bcg-green dark:text-bcg-gold hover:opacity-80 transition-opacity bg-bcg-light dark:bg-slate-800 px-4 py-2 rounded-full">
                                    <Icon name="arrowLeft" size={14} /> {t.common.prev}
                                </button>
                            ) : <div></div>}
                            {currentUnit < 9 ? (
                                <button onClick={() => jumpTo(currentUnit + 1)} className="flex items-center gap-2 text-sm font-bold text-bcg-green dark:text-bcg-gold hover:opacity-80 transition-opacity bg-bcg-light dark:bg-slate-800 px-4 py-2 rounded-full">
                                    {t.common.next} <Icon name="arrowRight" size={14} />
                                </button>
                            ) : <div></div>}
                        </div>
                    </main>

                    {/* 頁尾 Footer */}
                    <footer className="fixed bottom-0 w-full h-8 md:h-10 bg-bcg-green text-white/80 px-4 md:px-8 flex justify-between items-center text-[10px] md:text-xs z-50 font-medium shadow-[0_-2px_10px_rgba(0,0,0,0.1)]">
                        <div>2026.04.07b | &copy; Prof. Shihmin Lo</div>
                        <div className="flex gap-4 items-center">
                            <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" className="hover:text-bcg-gold transition-colors truncate max-w-[120px] md:max-w-none">
                                {t.common.architect}: Prof. Shihmin Lo
                            </a>
                            <button onClick={() => window.scrollTo({top:0, behavior:'smooth'})} className="flex items-center gap-1 hover:text-bcg-gold transition-colors">
                                {t.common.top} <Icon name="top" size={12} />
                            </button>
                        </div>
                    </footer>

                    <CopyrightModal show={showModal} onClose={() => setShowModal(false)} text={t.common.alertMsg} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
